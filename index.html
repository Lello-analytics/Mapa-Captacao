<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#ffffff">
<title>Mapa de Captação</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; color-scheme: light; background:#fff; }
  * { color-scheme: light; }
  #map { position:fixed; top:48px; left:0; right:0; bottom:0; }
  .header { position:fixed; top:0; left:0; right:0; height:48px; background:#0D1B3E; color:#F4F6FA;
    display:flex; align-items:center; padding:0 16px; z-index:1000; box-shadow:0 1px 4px rgba(0,0,0,0.3);
    font-size:15px; font-weight:600; letter-spacing:0.3px; }
  .header .accent { color:#028090; margin-right:8px; }
  .legend { background:white; padding:10px 12px; border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,0.3); font-size:13px; line-height:1.5; max-width:230px; }
  .legend b { font-size:14px; }
  .legend .filial-row { display:flex; justify-content:space-between; align-items:center; }
  .swatch { display:inline-block; width:13px; height:13px; border-radius:50%; margin-right:6px; vertical-align:middle; }
  .search-box { background:white; padding:10px; border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,0.3); font-size:13px; width:260px; }
  .search-box input { width:100%; box-sizing:border-box; padding:6px 8px; border:1px solid #ccc; border-radius:4px; font-size:13px; margin-bottom:6px; }
  .search-box button { width:100%; padding:6px 8px; background:#1E5FA5; color:white; border:none; border-radius:4px; font-size:13px; cursor:pointer; }
  .search-box button:hover { background:#16487f; }
  .search-status { font-size:12px; color:#666; margin-top:4px; min-height:14px; }
  .filter-box { background:white; padding:10px; border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,0.3); font-size:13px; width:260px; transition:margin-right 0.2s ease; }
  .filter-box .field { margin-bottom:10px; }
  .filter-box label { display:block; font-weight:600; margin-bottom:4px; font-size:12px; color:#333; }
  .filter-box select { width:100%; padding:6px; border:1px solid #ccc; border-radius:4px; font-size:13px; }
  .range-values { display:flex; justify-content:space-between; font-size:11px; color:#555; margin-bottom:2px; }
  .range-slider-wrap { position:relative; height:32px; }
  .range-slider-wrap input[type=range] { position:absolute; width:100%; pointer-events:none; appearance:none; background:transparent; top:10px; }
  .range-slider-wrap input[type=range]::-webkit-slider-thumb { pointer-events:auto; appearance:none; width:14px; height:14px; border-radius:50%; background:#1E5FA5; cursor:pointer; border:2px solid white; box-shadow:0 0 2px rgba(0,0,0,0.4); }
  .range-slider-wrap input[type=range]::-moz-range-thumb { pointer-events:auto; width:14px; height:14px; border-radius:50%; background:#1E5FA5; cursor:pointer; border:2px solid white; }
  .range-track { position:absolute; top:14px; height:4px; width:100%; background:#ddd; border-radius:2px; }
  .range-track-fill { position:absolute; top:14px; height:4px; background:#1E5FA5; border-radius:2px; }

  /* Painel lateral */
  #detail-panel { position:fixed; top:48px; right:0; bottom:0; width:310px; background:white;
    box-shadow:-2px 0 8px rgba(0,0,0,0.2); z-index:1100; transform:translateX(100%);
    transition:transform 0.2s ease; display:flex; flex-direction:column; box-sizing:border-box; }
  #detail-panel.open { transform:translateX(0); }
  #panel-header { padding:14px 16px 10px; border-bottom:1px solid #eee; flex-shrink:0; }
  #panel-header h3 { margin:0 28px 4px 0; font-size:15px; color:#0D1B3E; }
  #panel-header .sub { font-size:12px; color:#666; }
  #panel-header .badge-out { display:inline-block; background:#854F0B; color:white; font-size:11px; padding:2px 8px; border-radius:10px; margin-top:6px; }
  #panel-header .badge-in  { display:inline-block; background:#0D7A3B; color:white; font-size:11px; padding:2px 8px; border-radius:10px; margin-top:6px; }
  #panel-scroll { overflow-y:auto; flex:1; padding:10px 16px 16px; }
  .var-card { border:1px solid #e8e8e8; border-radius:6px; padding:10px 12px; margin-bottom:10px; background:#fafafa; }
  .var-card .tipo-label { font-size:12px; font-weight:700; color:#028090; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
  .var-card .row { font-size:13px; color:#333; margin-bottom:4px; }
  .var-card .row b { color:#0D1B3E; }
  #panel-coords { padding:8px 16px; border-top:1px solid #eee; font-size:11px; color:#999; flex-shrink:0; }
  .close-btn { position:absolute; top:10px; right:12px; cursor:pointer; font-size:18px; color:#888; background:none; border:none; z-index:10; }

  @media (max-width: 768px) {
    .header { font-size:13px; padding:0 10px; }
    .search-box, .filter-box, .legend { width:200px; font-size:12px; padding:8px; }
    .search-box input, .search-box button { font-size:12px; padding:6px 8px; }
    .filter-box label { font-size:11px; margin-bottom:3px; }
    .filter-box select { font-size:12px; padding:5px; }
    .filter-box .field { margin-bottom:8px; }
    .range-values { font-size:10px; }
    .range-slider-wrap input[type=range]::-webkit-slider-thumb { width:14px; height:14px; }
    .range-slider-wrap input[type=range]::-moz-range-thumb { width:14px; height:14px; }
    .range-slider-wrap { height:30px; }
    .range-slider-wrap input[type=range] { top:9px; }
    .range-track, .range-track-fill { top:13px; }
    .legend { font-size:12px; }
    #filter-count { font-size:10px !important; }
    #detail-panel { width:85vw; }

    /* Painéis recolhíveis em mobile */
    .search-box, .filter-box { display:none; }
    .search-box.mobile-open, .filter-box.mobile-open { display:block; }

    .mobile-toggle-btn {
      width:38px; height:38px; background:white; border:none; border-radius:6px;
      box-shadow:0 1px 4px rgba(0,0,0,0.3); font-size:17px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; margin-bottom:6px;
    }
    .mobile-toggle-btn.active { background:#1E5FA5; color:white; }
    .leaflet-top.leaflet-left .leaflet-control:first-child { display:none; }
  }
</style>
</head>

function haversineKm(lat1,lon1,lat2,lon2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function distanciaMaisProxima(lat,lon) {
  let menor=Infinity, filialProxima=null;
  filiais.forEach(f=>{ const d=haversineKm(lat,lon,f.lat,f.lon); if(d<menor){menor=d;filialProxima=f.filial;} });
  return {dist:menor, filial:filialProxima};
}
function raioPorTicket(tkt) {
  if(tkt===null) return 4;
  const pct=(tkt-TKT_MIN)/(TKT_MAX-TKT_MIN||1);
  return 3+pct*8;
}
function formatBRL(v) { return v==null?'-':'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function formatM2(v)  { return v==null?'-':v.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0})+' m²'; }

function renderProps() {
  propMarkers.clearLayers();
  const tktMin=parseFloat(document.getElementById('tkt-min').value);
  const tktMax=parseFloat(document.getElementById('tkt-max').value);
  const mtsMin=parseFloat(document.getElementById('mts-min').value);
  const mtsMax=parseFloat(document.getElementById('mts-max').value);
  const tipoSel=document.getElementById('tipo-select').value;
  const dormsSel=document.getElementById('dorms-select').value;

  let count=0;
  props.forEach(p=>{
    // filtrar variações que passam nos filtros
    const varsFiltradas = p.variacoes.filter(v=>{
      if(v.tkt===null||v.tkt<tktMin-0.5||v.tkt>tktMax+0.5) return false;
      if(v.mts===null||v.mts<mtsMin-0.5||v.mts>mtsMax+0.5) return false;
      if(tipoSel!=='TODOS'&&v.tipo!==tipoSel) return false;
      if(dormsSel!=='TODOS'&&String(v.dorms)!==dormsSel) return false;
      return true;
    });
    if(varsFiltradas.length===0) return;
    count++;
    const tkts=varsFiltradas.map(v=>v.tkt).filter(t=>t!=null);
    const tktRep=tkts.length?tkts.reduce((a,b)=>a+b,0)/tkts.length:null;
    const marker=L.circleMarker([p.lat,p.lon],{
      radius:raioPorTicket(tktRep)+PROP_RADIUS_BOOST, color:'#6B5B7A', weight:PROP_BORDER_W, fillColor:'#9B87AD', fillOpacity:PROP_OPACITY
    });
    marker.on('click',()=>abrirPainel(p, varsFiltradas));
    propMarkers.addLayer(marker);
  });
  document.getElementById('filter-count').textContent=count+' empreendimentos exibidos';
}

let searchMarker=null;
async function marcarCoordenada(){
  const status=document.getElementById('addr-status');
  const lat=parseFloat(document.getElementById('lat-input').value.trim().replace(',','.'));
  const lon=parseFloat(document.getElementById('lon-input').value.trim().replace(',','.'));
  if(isNaN(lat)||isNaN(lon)){status.textContent='Informe latitude e longitude válidas.';return;}
  if(lat<-90||lat>90||lon<-180||lon>180){status.textContent='Valores fora do intervalo permitido.';return;}
  if(searchMarker) map.removeLayer(searchMarker);
  searchMarker=L.circleMarker([lat,lon],{radius:10,color:'#fff',weight:2,fillColor:'#E11D2A',fillOpacity:0.95}).addTo(map);
  searchMarker.bindPopup(`<b>Ponto marcado</b><br>Lat: ${lat}, Lon: ${lon}<br>Buscando endereço...`).openPopup();
  map.setView([lat,lon],16); status.textContent='Buscando endereço...';
  try {
    const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`,{headers:{'Accept-Language':'pt-BR'}});
    const data=await res.json();
    let end='Endereço não encontrado.';
    if(data&&data.address){const a=data.address; const rua=a.road||a.pedestrian||''; const num=a.house_number||''; const bairro=a.suburb||a.neighbourhood||''; const cidade=a.city||a.town||a.municipality||''; end=[rua&&num?`${rua}, ${num}`:rua,bairro,cidade].filter(Boolean).join(' - ')||data.display_name||end;}
    searchMarker.setPopupContent(`<b>Ponto marcado</b><br>${end}<br>Lat: ${lat}, Lon: ${lon}`);
    status.textContent='Marcado!';
  } catch(e){ searchMarker.setPopupContent(`<b>Ponto marcado</b><br>Lat: ${lat}, Lon: ${lon}`); status.textContent='Marcado.'; }
}
function limparPesquisa(){
  if(searchMarker){map.removeLayer(searchMarker);searchMarker=null;}
  document.getElementById('lat-input').value='';
  document.getElementById('lon-input').value='';
  document.getElementById('addr-status').textContent='';
}
document.getElementById('addr-btn').addEventListener('click',marcarCoordenada);

function updateRangeUI(){
  let a=parseFloat(document.getElementById('tkt-min').value), b=parseFloat(document.getElementById('tkt-max').value);
  if(a>b)[a,b]=[b,a];
  document.getElementById('tkt-min-label').textContent=formatBRL(a);
  document.getElementById('tkt-max-label').textContent=formatBRL(b);
  const f=document.getElementById('range-fill');
  f.style.left=((a-TKT_MIN)/(TKT_MAX-TKT_MIN)*100)+'%';
  f.style.width=((b-a)/(TKT_MAX-TKT_MIN)*100)+'%';
}
function updateRangeUIMts(){
  let a=parseFloat(document.getElementById('mts-min').value), b=parseFloat(document.getElementById('mts-max').value);
  if(a>b)[a,b]=[b,a];
  document.getElementById('mts-min-label').textContent=formatM2(a);
  document.getElementById('mts-max-label').textContent=formatM2(b);
  const f=document.getElementById('range-fill-mts');
  f.style.left=((a-MTS_MIN)/(MTS_MAX-MTS_MIN)*100)+'%';
  f.style.width=((b-a)/(MTS_MAX-MTS_MIN)*100)+'%';
}

document.getElementById('tkt-min').addEventListener('input',function(){if(parseFloat(this.value)>parseFloat(document.getElementById('tkt-max').value))document.getElementById('tkt-max').value=this.value;updateRangeUI();renderProps();});
document.getElementById('tkt-max').addEventListener('input',function(){if(parseFloat(this.value)<parseFloat(document.getElementById('tkt-min').value))document.getElementById('tkt-min').value=this.value;updateRangeUI();renderProps();});
document.getElementById('mts-min').addEventListener('input',function(){if(parseFloat(this.value)>parseFloat(document.getElementById('mts-max').value))document.getElementById('mts-max').value=this.value;updateRangeUIMts();renderProps();});
document.getElementById('mts-max').addEventListener('input',function(){if(parseFloat(this.value)<parseFloat(document.getElementById('mts-min').value))document.getElementById('mts-min').value=this.value;updateRangeUIMts();renderProps();});
document.getElementById('tipo-select').addEventListener('change',renderProps);
document.getElementById('dorms-select').addEventListener('change',renderProps);

updateRangeUI(); updateRangeUIMts(); renderProps();

// Painéis recolhíveis em mobile
function isMobile() { return window.innerWidth <= 768; }

if (isMobile()) {
  const searchBox = document.querySelector('.search-box');
  const filterBox = document.querySelector('.filter-box');

  const toggleWrap = L.control({position: 'topleft'});
  toggleWrap.onAdd = function() {
    const div = L.DomUtil.create('div');
    div.innerHTML = `
      <button class="mobile-toggle-btn" id="toggle-search">📍</button>
      <button class="mobile-toggle-btn" id="toggle-filter">⚙️</button>
    `;
    L.DomEvent.disableClickPropagation(div);
    return div;
  };
  toggleWrap.addTo(map);

  document.getElementById('toggle-search').addEventListener('click', function() {
    searchBox.classList.toggle('mobile-open');
    filterBox.classList.remove('mobile-open');
    document.getElementById('toggle-filter').classList.remove('active');
    this.classList.toggle('active');
  });
  document.getElementById('toggle-filter').addEventListener('click', function() {
    filterBox.classList.toggle('mobile-open');
    searchBox.classList.remove('mobile-open');
    document.getElementById('toggle-search').classList.remove('active');
    this.classList.toggle('active');
  });
}
</script>
